version: "3.9"

# Local development infrastructure.
# Starts the observability stack (Loki + Prometheus + Grafana + dummy payments-api).
# The Tinker server is intentionally excluded — run it from your IDE/terminal.
#
# Usage:
#   cd local-dev
#   ./run.sh

services:

  # ── Dummy payments-api (generates logs + metrics) ─────────────────────────
  payments-api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./dummy_server.py:/app/dummy_server.py:ro
    ports:
      - "7001:7000"
    environment:
      PORT: 7000
      SERVICE_NAME: payments-api
      LOKI_URL: http://loki:3100
    command: python dummy_server.py
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:7000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Loki (log storage) ─────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus (metrics) ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Grafana UI (visual log/metric exploration) ─────────────────────────────
  grafana:
    image: grafana/grafana:10.3.3
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    depends_on:
      - loki
      - prometheus
