# Default values for Tinker.
# Override with: helm install tinker ./deploy/helm/tinker -f tinker-values.yaml

image:
  repository: ghcr.io/tinker-ai/tinker
  tag: latest
  pullPolicy: IfNotPresent

# Number of replicas — 1 is fine, Tinker is stateless
replicaCount: 1

# Resource limits
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Environment variables — non-secret config
# Secrets (API keys, tokens) go in the `secrets` block below
env:
  TINKER_BACKEND: "cloudwatch"      # cloudwatch | gcp | azure | grafana | datadog | elastic
  TINKER_SERVER_PORT: "8000"
  TINKER_DEFAULT_MODEL: "anthropic/claude-sonnet-4-6"
  TINKER_DEEP_RCA_MODEL: "anthropic/claude-opus-4-6"
  # AWS
  # AWS_REGION: "us-east-1"
  # GCP
  # GCP_PROJECT_ID: "my-project"
  # Azure
  # AZURE_LOG_ANALYTICS_WORKSPACE_ID: ""
  # AZURE_SUBSCRIPTION_ID: ""
  # AZURE_RESOURCE_GROUP: ""
  # Grafana / self-hosted
  # GRAFANA_LOKI_URL: "http://loki:3100"
  # GRAFANA_PROMETHEUS_URL: "http://prometheus:9090"

# Secrets — values are injected from Kubernetes Secrets.
# Create the secret separately (or use an operator like External Secrets):
#   kubectl create secret generic tinker-secrets \
#     --from-literal=anthropic-api-key=sk-ant-... \
#     --from-literal=api-keys='[{"hash":"...","subject":"default","roles":["sre"]}]'
secrets:
  # Name of the Kubernetes Secret to read from
  secretName: tinker-secrets
  # Keys inside the secret → env var names in the container
  keys:
    anthropic-api-key: ANTHROPIC_API_KEY
    api-keys: TINKER_API_KEYS
    # slack-bot-token: SLACK_BOT_TOKEN
    # slack-signing-secret: SLACK_SIGNING_SECRET
    # github-token: GITHUB_TOKEN

# Slack integration
slack:
  enabled: false
  alertsChannel: "#incidents"

# GitHub integration
github:
  enabled: false
  repo: ""                          # org/repo

# Service
service:
  type: ClusterIP
  port: 8000

# Ingress — disabled by default, expose via internal LB or VPN
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  host: tinker.your-company.internal
  tls: []
  #  - secretName: tinker-tls
  #    hosts:
  #      - tinker.your-company.internal

# ServiceAccount — used for cloud identity (IRSA on EKS, Workload Identity on GKE)
serviceAccount:
  create: true
  name: ""
  annotations: {}
    # AWS IRSA:
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/tinker-readonly
    # GKE Workload Identity:
    # iam.gke.io/gcp-service-account: tinker-readonly@PROJECT.iam.gserviceaccount.com
    # Azure Workload Identity:
    # azure.workload.identity/client-id: <CLIENT_ID>

# Pod annotations — e.g. for Azure Workload Identity
podAnnotations: {}
  # azure.workload.identity/use: "true"

# Liveness / readiness probes
probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 30
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10

# Horizontal Pod Autoscaler — disabled by default (1 replica is enough for most teams)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
