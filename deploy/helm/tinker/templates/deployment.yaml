apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tinker.fullname" . }}
  labels:
    {{- include "tinker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tinker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tinker.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "tinker.serviceAccountName" . }}
      containers:
        - name: tinker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- range $secretKey, $envName := .Values.secrets.keys }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secrets.secretName }}
                  key: {{ $secretKey }}
            {{- end }}
            {{- if .Values.slack.enabled }}
            - name: SLACK_ALERTS_CHANNEL
              value: {{ .Values.slack.alertsChannel | quote }}
            {{- end }}
            {{- if .Values.github.enabled }}
            - name: GITHUB_REPO
              value: {{ .Values.github.repo | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
